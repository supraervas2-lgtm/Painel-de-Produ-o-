<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supraervas — Painel de Controle de Produção</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --verde-escuro:#1B5E20;
    --verde:#2E7D32;
    --verde-claro:#66BB6A;
    --verde-bg:#F0FDF4;
    --ambar:#D97706;
    --ambar-bg:#FFFBEB;
    --azul:#2563EB;
    --azul-bg:#EFF6FF;
    --cinza-900:#1F2937;
    --cinza-600:#4B5563;
    --cinza-400:#9CA3AF;
    --cinza-200:#E5E7EB;
    --cinza-100:#F3F4F6;
    --branco:#FFFFFF;
    --vermelho:#DC2626;
    --sombra: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --sombra-hover: 0 8px 20px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--cinza-100);
    color:var(--cinza-900);
  }

  /* ===== HEADER ===== */
  header{
    background:linear-gradient(120deg,var(--verde-escuro),var(--verde));
    color:#fff;
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    box-shadow:var(--sombra);
  }
  header .titulo{display:flex;align-items:center;gap:12px;}
  header .titulo .folha{
    width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;font-size:22px;
  }
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px;}
  header p{margin:0;font-size:12.5px;opacity:.85;}

  .upload-area{
    display:flex;align-items:center;gap:10px;
  }
  .upload-btn{
    background:#fff;color:var(--verde-escuro);
    padding:9px 16px;border-radius:8px;font-weight:600;font-size:13.5px;
    cursor:pointer;display:flex;align-items:center;gap:8px;
    box-shadow:var(--sombra);transition:.15s;
    border:none;
  }
  .upload-btn:hover{transform:translateY(-1px);box-shadow:var(--sombra-hover);}
  #arquivoInput{display:none;}
  .upload-status{font-size:12px;color:#fff;opacity:.9;max-width:220px;}

  /* ===== BOARD ===== */
  main{padding:22px;max-width:1500px;margin:0 auto;}
  .board{
    display:grid;
    grid-template-columns:repeat(3,minmax(300px,1fr));
    gap:18px;
    align-items:start;
  }
  @media(max-width:980px){
    .board{grid-template-columns:1fr;}
  }

  .coluna{
    background:var(--branco);
    border-radius:14px;
    box-shadow:var(--sombra);
    min-height:200px;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .coluna-header{
    padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--cinza-200);
    position:sticky;top:0;
  }
  .coluna-header .rotulo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14.5px;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .hall .coluna-header{background:var(--ambar-bg);}
  .hall .dot{background:var(--ambar);}
  .producao .coluna-header{background:var(--azul-bg);}
  .producao .dot{background:var(--azul);}
  .final .coluna-header{background:var(--verde-bg);}
  .final .dot{background:var(--verde);}

  .contador{
    background:rgba(0,0,0,.06);
    border-radius:20px;padding:2px 10px;font-size:12.5px;font-weight:700;
  }

  .cartoes{padding:12px;display:flex;flex-direction:column;gap:10px;flex:1;min-height:80px;}
  .vazio{
    text-align:center;color:var(--cinza-400);font-size:13px;padding:26px 10px;
    border:1.5px dashed var(--cinza-200);border-radius:10px;
  }

  .cartao{
    background:var(--branco);
    border:1px solid var(--cinza-200);
    border-left:4px solid var(--ambar);
    border-radius:10px;
    padding:12px 13px;
    box-shadow:var(--sombra);
    transition:.15s;
  }
  .cartao:hover{box-shadow:var(--sombra-hover);transform:translateY(-1px);}
  .producao .cartao{border-left-color:var(--azul);}
  .final .cartao{border-left-color:var(--verde);opacity:.92;}

  .cartao .linha-topo{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .cartao .op-num{font-weight:800;font-size:13.5px;color:var(--verde-escuro);}
  .cartao .data-emissao{font-size:11px;color:var(--cinza-400);white-space:nowrap;}
  .cartao .descricao{font-weight:600;font-size:13.5px;margin-bottom:6px;color:var(--cinza-900);}
  .cartao .meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;font-size:12px;color:var(--cinza-600);margin-bottom:10px;}
  .cartao .meta b{color:var(--cinza-900);font-weight:600;}

  .btn{
    width:100%;border:none;border-radius:8px;padding:8px 10px;
    font-size:13px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .btn-iniciar{background:var(--verde);color:#fff;}
  .btn-iniciar:hover{background:var(--verde-escuro);}
  .btn-registrar{background:var(--azul);color:#fff;}
  .btn-registrar:hover{background:#1D4ED8;}
  .tag-concluida{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--verde-bg);color:var(--verde-escuro);
    font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:20px;
  }
  .tag-familia{
    display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;
    padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;
  }
  .fam-capsula{background:#F3E8FF;color:#7C3AED;}
  .fam-comprimido{background:#E0F2FE;color:#0369A1;}
  .fam-soluvel{background:#FFF7ED;color:#C2410C;}
  .fam-outro{background:var(--cinza-100);color:var(--cinza-600);}
  .final .meta-final{font-size:11.5px;color:var(--cinza-600);border-top:1px dashed var(--cinza-200);padding-top:7px;margin-top:2px;}

  footer{max-width:1500px;margin:0 auto;padding:0 22px 30px;display:flex;justify-content:flex-end;}
  .btn-reset{
    background:none;border:1px solid var(--cinza-200);color:var(--cinza-600);
    font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;
  }
  .btn-reset:hover{border-color:var(--vermelho);color:var(--vermelho);}

  /* ===== MODAL ===== */
  .overlay{
    position:fixed;inset:0;background:rgba(15,23,42,.5);
    display:none;align-items:center;justify-content:center;padding:16px;z-index:50;
  }
  .overlay.ativo{display:flex;}
  .modal{
    background:#fff;border-radius:14px;max-width:480px;width:100%;
    max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .modal-header{
    background:linear-gradient(120deg,var(--verde-escuro),var(--verde));
    color:#fff;padding:16px 20px;border-radius:14px 14px 0 0;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .modal-header h2{margin:0;font-size:16px;}
  .modal-header p{margin:3px 0 0;font-size:12.5px;opacity:.85;}
  .fechar{background:rgba(255,255,255,.15);border:none;color:#fff;width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:15px;}
  .modal-body{padding:18px 20px 6px;}

  .campo{margin-bottom:14px;}

  .campo-header-op{
    background:var(--verde-bg);border:1px solid #C8E6C9;border-radius:10px;
    padding:12px 14px;margin-bottom:16px;
  }
  .linha-op-header{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  .rotulo-op{display:block;font-size:10.5px;font-weight:700;color:var(--verde-escuro);text-transform:uppercase;letter-spacing:.3px;}
  .valor-op{display:block;font-size:14px;font-weight:600;color:var(--cinza-900);margin-top:2px;}
  .campo label{display:block;font-size:12.5px;font-weight:700;color:var(--cinza-600);margin-bottom:5px;}
  .campo input,.campo textarea{
    width:100%;padding:9px 11px;border:1.5px solid var(--cinza-200);border-radius:8px;
    font-size:13.5px;font-family:inherit;
  }
  .campo input:focus,.campo textarea:focus{outline:none;border-color:var(--verde);}
  .turnos{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .turno-btn{
    padding:8px 4px;border:1.5px solid var(--cinza-200);border-radius:8px;
    background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--cinza-600);
  }
  .turno-btn.active{background:var(--verde);border-color:var(--verde);color:#fff;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .modal-footer{padding:14px 20px 20px;}
  .btn-salvar{background:var(--verde);color:#fff;font-size:14.5px;padding:11px;}
  .btn-salvar:hover{background:var(--verde-escuro);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--verde);color:#fff;padding:12px 20px;border-radius:9px;
    font-size:13.5px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.2);
    display:none;z-index:100;
  }
</style>
</head>
<body>

<header>
  <div class="titulo">
    <div class="folha">🌿</div>
    <div>
      <h1>Supraervas — Painel de Controle de Produção</h1>
      <p>Hall das OPs → Em Produção → Finalizadas</p>
    </div>
  </div>
  <div class="upload-area">
    <label class="upload-btn" for="arquivoInput">📤 Importar OPs (CSV/Excel)</label>
    <input type="file" id="arquivoInput" accept=".csv,.xlsx,.xls" onchange="importarArquivo(event)">
    <span class="upload-status" id="uploadStatus"></span>
  </div>
</header>

<main>
  <div class="board">
    <div class="coluna hall">
      <div class="coluna-header">
        <span class="rotulo"><span class="dot"></span>Hall das OPs</span>
        <span class="contador" id="contHall">0</span>
      </div>
      <div class="cartoes" id="colHall"></div>
    </div>

    <div class="coluna producao">
      <div class="coluna-header">
        <span class="rotulo"><span class="dot"></span>OPs em Produção</span>
        <span class="contador" id="contProducao">0</span>
      </div>
      <div class="cartoes" id="colProducao"></div>
    </div>

    <div class="coluna final">
      <div class="coluna-header">
        <span class="rotulo"><span class="dot"></span>OPs Finalizadas</span>
        <span class="contador" id="contFinal">0</span>
      </div>
      <div class="cartoes" id="colFinal"></div>
    </div>
  </div>
</main>

<footer>
  <button class="btn-reset" onclick="resetarTudo()">🗑️ Limpar painel (novo ciclo)</button>
</footer>

<!-- MODAL: Formulário de Registro de Produção -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modalOp">Registro de Produção</h2>
        <p id="modalDescricao"></p>
      </div>
      <button class="fechar" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="campo-header-op">
        <div class="linha-op-header">
          <div><span class="rotulo-op">N° da OP</span><span class="valor-op" id="hOp"></span></div>
          <div><span class="rotulo-op">Código do Produto</span><span class="valor-op" id="hCodigo"></span></div>
        </div>
        <div><span class="rotulo-op">Nome do Produto</span><span class="valor-op" id="hNomeProduto"></span></div>
      </div>

      <div class="campo">
        <label>Turno</label>
        <div class="turnos" id="turnoBtns">
          <button type="button" class="turno-btn" onclick="selecionarTurno(this,'1º')">1º</button>
          <button type="button" class="turno-btn" onclick="selecionarTurno(this,'2º')">2º</button>
          <button type="button" class="turno-btn" onclick="selecionarTurno(this,'3º')">3º</button>
          <button type="button" class="turno-btn" onclick="selecionarTurno(this,'Adm')">Adm</button>
        </div>
      </div>
      <div class="grid2">
        <div class="campo">
          <label>Horário de Início</label>
          <input type="time" id="fHoraInicio">
        </div>
        <div class="campo">
          <label>Horário de Término</label>
          <input type="time" id="fHoraTermino">
        </div>
      </div>
      <div class="grid2">
        <div class="campo">
          <label>Operador Responsável</label>
          <input type="text" id="fOperador" placeholder="Nome do operador">
        </div>
        <div class="campo">
          <label>Máquina/Linha de Produção</label>
          <input type="text" id="fMaquina" placeholder="Ex: Ribon A">
        </div>
      </div>
      <div class="campo">
        <label style="margin-bottom:8px;">Quantidades</label>
        <div class="grid3">
          <div class="campo" style="margin-bottom:0;">
            <label style="font-weight:600;">Produzida</label>
            <input type="number" id="fProduzido" placeholder="0">
          </div>
          <div class="campo" style="margin-bottom:0;">
            <label style="font-weight:600;">Refugo</label>
            <input type="number" id="fRefugo" placeholder="0">
          </div>
          <div class="campo" style="margin-bottom:0;">
            <label style="font-weight:600;">Retrabalho</label>
            <input type="number" id="fRetrabalho" placeholder="0">
          </div>
        </div>
      </div>
      <div class="campo">
        <label>Observações / Ocorrências</label>
        <textarea id="fObs" rows="2" placeholder="Opcional"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-salvar" onclick="salvarRegistro()">✅ Salvar Registro</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
// Reaproveita a mesma planilha/Apps Script do formulário de Produção já em uso.
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzbFEly_KS5YsTQWqhaIs5loV8QyECOu39aKy1slXQF2jmvGI-YiHMX5xwRC3neV-kE/exec';

/* ================= ESTADO ================= */
let hall = [];
let emProducao = [];
let finalizadas = [];
let opAtual = null;
let turnoSelecionado = '';

/* ================= PERSISTÊNCIA ================= */
async function carregarEstado(){
  try{
    const h = await window.storage.get('painel-hall');
    hall = h ? JSON.parse(h.value) : [];
  }catch(e){ hall = []; }
  try{
    const p = await window.storage.get('painel-em-producao');
    emProducao = p ? JSON.parse(p.value) : [];
  }catch(e){ emProducao = []; }
  try{
    const f = await window.storage.get('painel-finalizadas');
    finalizadas = f ? JSON.parse(f.value) : [];
  }catch(e){ finalizadas = []; }
  renderTudo();
}

async function salvarEstado(){
  try{ await window.storage.set('painel-hall', JSON.stringify(hall)); }catch(e){}
  try{ await window.storage.set('painel-em-producao', JSON.stringify(emProducao)); }catch(e){}
  try{ await window.storage.set('painel-finalizadas', JSON.stringify(finalizadas)); }catch(e){}
}

/* ================= IMPORTAÇÃO CSV/EXCEL ================= */
function normalizar(txt){
  return String(txt||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

const ALIASES = {
  op:        ['n op','nº op','no op','numero op','número op','op','nro op','num op','ordem de producao','ordem de produção'],
  dataEmissao:['data de emissao','data emissao','data emissão','dt emissao','data','emissao'],
  codProduto:['cod produto','cód produto','codigo produto','código produto','cod. produto','cód. produto','codigo','código'],
  descricao: ['descricao','descrição','produto','nome produto','desc'],
  qtde:      ['qtde','quantidade','qtd','qtde solicitada'],
  cliente:   ['cliente','client'],
  familia:   ['familia','família']
};

function mapearColunas(headerRow){
  const norm = headerRow.map(h => normalizar(h));
  const map = {};
  for(const campo in ALIASES){
    let idx = -1;
    for(const alias of ALIASES[campo]){
      idx = norm.findIndex(h => h === alias);
      if(idx !== -1) break;
    }
    if(idx === -1){
      idx = norm.findIndex(h => ALIASES[campo].some(a => h.includes(a)));
    }
    map[campo] = idx;
  }
  return map;
}

function importarArquivo(event){
  const file = event.target.files[0];
  if(!file) return;
  const status = document.getElementById('uploadStatus');
  status.textContent = 'Lendo ' + file.name + '...';

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, dateNF:'dd/mm/yyyy'});

      if(rows.length < 2){
        status.textContent = '⚠️ Arquivo vazio.';
        return;
      }

      const map = mapearColunas(rows[0]);
      const faltando = Object.keys(map).filter(k => map[k] === -1);
      if(faltando.length){
        status.textContent = '⚠️ Colunas não encontradas: ' + faltando.join(', ');
      }

      const existentes = new Set([...hall, ...emProducao, ...finalizadas].map(o => o.op));
      let novas = 0;

      for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r || r.every(c => !String(c||'').trim())) continue;
        const opNum = map.op !== -1 ? String(r[map.op]||'').trim() : '';
        if(!opNum || existentes.has(opNum)) continue;

        hall.push({
          op: opNum,
          dataEmissao: map.dataEmissao !== -1 ? String(r[map.dataEmissao]||'').trim() : '',
          codProduto: map.codProduto !== -1 ? String(r[map.codProduto]||'').trim() : '',
          descricao: map.descricao !== -1 ? String(r[map.descricao]||'').trim() : '',
          qtde: map.qtde !== -1 ? String(r[map.qtde]||'').trim() : '',
          cliente: map.cliente !== -1 ? String(r[map.cliente]||'').trim() : '',
          familia: map.familia !== -1 ? String(r[map.familia]||'').trim() : ''
        });
        existentes.add(opNum);
        novas++;
      }

      status.textContent = novas > 0 ? `✅ ${novas} OP(s) importada(s).` : 'Nenhuma OP nova encontrada.';
      renderTudo();
      salvarEstado();

      // Envia as OPs novas para a aba compartilhada Hall_OPs (para o Registro Diário de Produção ler)
      if(novas > 0){
        const opsNovas = hall.slice(-novas);
        fetch(SHEETS_URL, {
          method:'POST', mode:'no-cors',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ acao: 'importar_hall', ops: opsNovas })
        }).then(() => {
          status.textContent += ' Sincronizado com a planilha ✅';
        }).catch(() => {
          status.textContent += ' (⚠️ falha ao sincronizar com a planilha)';
        });
      }
    }catch(err){
      console.error(err);
      status.textContent = '⚠️ Erro ao ler o arquivo.';
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

/* ================= RENDERIZAÇÃO ================= */
function classeFamilia(familia){
  const f = normalizar(familia);
  if(f.includes('capsula')) return 'fam-capsula';
  if(f.includes('comprimido')) return 'fam-comprimido';
  if(f.includes('soluvel')) return 'fam-soluvel';
  return 'fam-outro';
}

function renderTudo(){
  renderHall();
  renderProducao();
  renderFinal();
}

function renderHall(){
  const el = document.getElementById('colHall');
  document.getElementById('contHall').textContent = hall.length;
  if(hall.length === 0){
    el.innerHTML = '<div class="vazio">Nenhuma OP pendente.<br>Importe um arquivo CSV/Excel acima.</div>';
    return;
  }
  el.innerHTML = hall.map(o => `
    <div class="cartao">
      <div class="linha-topo">
        <span class="op-num">OP ${escapeHtml(o.op)}</span>
        <span class="data-emissao">${escapeHtml(o.dataEmissao)}</span>
      </div>
      <div class="descricao">${escapeHtml(o.descricao || '(sem descrição)')}</div>
      ${o.familia ? `<span class="tag-familia ${classeFamilia(o.familia)}">${escapeHtml(o.familia)}</span>` : ''}
      <div class="meta" style="margin-top:6px;">
        <div>Código: <b>${escapeHtml(o.codProduto)}</b></div>
        <div>Qtde: <b>${escapeHtml(o.qtde)}</b></div>
        <div style="grid-column:1/-1;">Cliente: <b>${escapeHtml(o.cliente)}</b></div>
      </div>
      <button class="btn btn-iniciar" onclick="iniciarProducao('${escapeAttr(o.op)}')">▶ Iniciar Produção</button>
    </div>
  `).join('');
}

function renderProducao(){
  const el = document.getElementById('colProducao');
  document.getElementById('contProducao').textContent = emProducao.length;
  if(emProducao.length === 0){
    el.innerHTML = '<div class="vazio">Nenhuma OP em produção.</div>';
    return;
  }
  el.innerHTML = emProducao.map(o => `
    <div class="cartao">
      <div class="linha-topo">
        <span class="op-num">OP ${escapeHtml(o.op)}</span>
        <span class="data-emissao">${escapeHtml(o.dataEmissao)}</span>
      </div>
      <div class="descricao">${escapeHtml(o.descricao || '(sem descrição)')}</div>
      ${o.familia ? `<span class="tag-familia ${classeFamilia(o.familia)}">${escapeHtml(o.familia)}</span>` : ''}
      <div class="meta" style="margin-top:6px;">
        <div>Código: <b>${escapeHtml(o.codProduto)}</b></div>
        <div>Qtde: <b>${escapeHtml(o.qtde)}</b></div>
        <div style="grid-column:1/-1;">Cliente: <b>${escapeHtml(o.cliente)}</b></div>
      </div>
      <button class="btn btn-registrar" onclick="abrirModal('${escapeAttr(o.op)}')">📋 Preencher Registro</button>
    </div>
  `).join('');
}

function renderFinal(){
  const el = document.getElementById('colFinal');
  document.getElementById('contFinal').textContent = finalizadas.length;
  if(finalizadas.length === 0){
    el.innerHTML = '<div class="vazio">Nenhuma OP finalizada ainda.</div>';
    return;
  }
  el.innerHTML = finalizadas.slice().reverse().map(o => `
    <div class="cartao">
      <div class="linha-topo">
        <span class="op-num">OP ${escapeHtml(o.op)}</span>
        <span class="tag-concluida">✔ Concluída</span>
      </div>
      <div class="descricao">${escapeHtml(o.descricao || '(sem descrição)')}</div>
      <div class="meta">
        <div>Produzido: <b>${escapeHtml(o.produzido)}</b></div>
        <div>Refugo: <b>${escapeHtml(o.refugo || '0')}</b></div>
      </div>
      <div class="meta-final">Turno ${escapeHtml(o.turno)} · ${escapeHtml(o.hora_inicio||'')}–${escapeHtml(o.hora_termino||'')} · Operador: ${escapeHtml(o.operador)} · Máquina: ${escapeHtml(o.maquina)}</div>
    </div>
  `).join('');
}

/* ================= AÇÕES ================= */
function iniciarProducao(opNum){
  const idx = hall.findIndex(o => o.op === opNum);
  if(idx === -1) return;
  const [item] = hall.splice(idx,1);
  emProducao.push(item);
  renderTudo();
  salvarEstado();
}

function abrirModal(opNum){
  opAtual = emProducao.find(o => o.op === opNum);
  if(!opAtual) return;
  document.getElementById('modalOp').textContent = 'Registro de Produção';
  document.getElementById('modalDescricao').textContent = 'Preencha os dados da execução desta OP';
  document.getElementById('hOp').textContent = opAtual.op;
  document.getElementById('hCodigo').textContent = opAtual.codProduto || '—';
  document.getElementById('hNomeProduto').textContent = opAtual.descricao || '—';
  document.getElementById('fOperador').value = '';
  document.getElementById('fMaquina').value = '';
  document.getElementById('fHoraInicio').value = '';
  document.getElementById('fHoraTermino').value = '';
  document.getElementById('fProduzido').value = '';
  document.getElementById('fRefugo').value = '';
  document.getElementById('fRetrabalho').value = '';
  document.getElementById('fObs').value = '';
  turnoSelecionado = '';
  document.querySelectorAll('.turno-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('overlay').classList.add('ativo');
}

function fecharModal(){
  document.getElementById('overlay').classList.remove('ativo');
  opAtual = null;
}

function selecionarTurno(btn, valor){
  document.querySelectorAll('.turno-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  turnoSelecionado = valor;
}

async function salvarRegistro(){
  if(!opAtual) return;
  const operador = document.getElementById('fOperador').value.trim();
  const maquina = document.getElementById('fMaquina').value.trim();
  const horaInicio = document.getElementById('fHoraInicio').value;
  const horaTermino = document.getElementById('fHoraTermino').value;
  const produzido = document.getElementById('fProduzido').value;

  if(!turnoSelecionado){ mostrarToast('⚠️ Selecione o turno', '#D97706'); return; }
  if(!horaInicio){ mostrarToast('⚠️ Informe o horário de início', '#D97706'); return; }
  if(!horaTermino){ mostrarToast('⚠️ Informe o horário de término', '#D97706'); return; }
  if(!operador){ mostrarToast('⚠️ Informe o operador', '#D97706'); return; }
  if(!maquina){ mostrarToast('⚠️ Informe a máquina/linha', '#D97706'); return; }
  if(!produzido){ mostrarToast('⚠️ Informe a qtde produzida', '#D97706'); return; }

  const reg = {
    data: new Date().toLocaleDateString('pt-BR'),
    op: opAtual.op,
    codigo: opAtual.codProduto,
    produto: opAtual.descricao,
    cliente: opAtual.cliente,
    qtdeOp: opAtual.qtde,
    turno: turnoSelecionado,
    hora_inicio: horaInicio,
    hora_termino: horaTermino,
    operador,
    maquina,
    produzido: parseInt(produzido) || 0,
    refugo: parseInt(document.getElementById('fRefugo').value) || 0,
    retrabalho: parseInt(document.getElementById('fRetrabalho').value) || 0,
    obs: document.getElementById('fObs').value.trim(),
  };

  // move para Finalizadas
  const idx = emProducao.findIndex(o => o.op === opAtual.op);
  if(idx !== -1) emProducao.splice(idx,1);
  finalizadas.push(reg);
  renderTudo();
  salvarEstado();
  fecharModal();

  // envia para o Google Sheets (mesma planilha do formulário atual)
  try{
    await fetch(SHEETS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(reg)
    });
    mostrarToast('✅ Registro salvo e enviado para a planilha!');
  }catch(err){
    mostrarToast('⚠️ Salvo no painel, mas houve erro ao enviar para a planilha.', '#D97706');
  }
}

function resetarTudo(){
  if(!confirm('Isso vai limpar o Hall, OPs em Produção e Finalizadas deste painel. Confirma?')) return;
  hall = []; emProducao = []; finalizadas = [];
  renderTudo();
  salvarEstado();
  document.getElementById('uploadStatus').textContent = '';
}

/* ================= UTIL ================= */
function mostrarToast(msg, cor){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = cor || '#2E7D32';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return String(s ?? '').replace(/'/g, "\\'"); }

/* ================= INIT ================= */
carregarEstado();
</script>
